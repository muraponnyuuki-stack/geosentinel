    <g class="country" data-code="NO" data-name="Norway" data-region="Northern Europe" transform="translate(522,81)"><circle class="ring" r="11"/><circle class="node" r="4"/><text class="label" x="9" y="4">NO</text></g>
    <g class="country" data-code="PL" data-name="Poland" data-region="Eastern Europe" transform="translate(553,106)"><circle class="ring" r="11"/><circle class="node" r="4"/><text class="label" x="9" y="4">PL</text></g>
    <g class="country" data-code="UA" data-name="Ukraine" data-region="Ukraine" transform="translate(586,114)"><circle class="ring" r="11"/><circle class="node" r="4"/><text class="label" x="9" y="4">UA</text></g>
