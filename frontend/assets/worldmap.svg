    <g class="country" data-code="IL" data-name="Israel" data-region="Levant" transform="translate(597,164)"><circle class="ring" r="11"/><circle class="node" r="4"/><text class="label" x="9" y="4">IL</text></g>
    <g class="country" data-code="IR" data-name="Iran" data-region="Iran" transform="translate(647,161)"><circle class="ring" r="11"/><circle class="node" r="4"/><text class="label" x="9" y="4">IR</text></g>
