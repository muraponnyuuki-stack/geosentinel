    <g class="country" data-code="VN" data-name="Vietnam" data-region="Southeast Asia" transform="translate(794,206)"><circle class="ring" r="11"/><circle class="node" r="4"/><text class="label" x="9" y="4">VN</text></g>
    <g class="country" data-code="AU" data-name="Australia" data-region="Oceania" transform="translate(872,319)"><circle class="ring" r="11"/><circle class="node" r="4"/><text class="label" x="9" y="4">AU</text></g>
